<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pricing</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="pricing-container">
        <h2>Choose Your Plan</h2>

        <div class="pricing-grid">

            <div class="plan">
                <h3>Monthly Accountability</h3>
                <p>$29/month</p>
                <button>Select</button>
            </div>

            <div class="plan">
                <h3>Weekly Accountability</h3>
                <p>$59/month</p>
                <button>Select</button>
            </div>

            <div class="plan">
                <h3>Full Financial Coaching</h3>
                <p>$149/month</p>
                <button>Select</button>
            </div>

        </div>
    </div>
</body>
</html>
