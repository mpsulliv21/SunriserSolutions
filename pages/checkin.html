<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monthly Check-In</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="form-container">
        <h2>Monthly Check-In</h2>

        <h3>Upload Receipt</h3>
        <input type="file">

        <h3>Enter Monthly Expenses</h3>
        <input type="number" placeholder="Housing">
        <input type="number" placeholder="Transportation">
        <input type="number" placeholder="Food">
        <input type="number" placeholder="Entertainment">
        <input type="number" placeholder="Miscellaneous">

        <button>Submit Check-In</button>
    </div>
</body>
</html>
