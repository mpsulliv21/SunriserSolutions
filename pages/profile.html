<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Profile</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="form-container">
        <h2>Your Financial Profile</h2>

        <h3>Demographics</h3>
        <input type="number" placeholder="Age">
        <input type="text" placeholder="City, State">
        <input type="text" placeholder="Employment Status">

        <h3>Monthly Income</h3>
        <input type="number" placeholder="Total Monthly Income">

        <h3>Monthly Expenses</h3>
        <input type="number" placeholder="Housing">
        <input type="number" placeholder="Transportation">
        <input type="number" placeholder="Food">
        <input type="number" placeholder="Entertainment">
        <input type="number" placeholder="Miscellaneous">

        <h3>Savings Goal</h3>
        <input type="number" placeholder="Monthly Savings Goal ($)">

        <button>Save Profile</button>
    </div>
</body>
</html>
