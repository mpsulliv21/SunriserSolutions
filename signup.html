<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Your Account — Sunriser Solutions</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Minimal inline styles so the page looks OK without your CSS */
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; background:#f6f7fb; color:#111; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#fff; padding:28px; border-radius:8px; box-shadow:0 6px 20px rgba(20,30,60,0.08); width:360px; }
    label { display:block; margin-top:12px; font-size:13px; color:#444; }
    input[type="email"], input[type="password"] { width:100%; padding:10px 12px; margin-top:6px; border:1px solid #e3e6ee; border-radius:6px; font-size:14px; }
    button { margin-top:18px; width:100%; padding:10px 12px; background:#2563eb; color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; }
    .muted { margin-top:12px; font-size:13px; color:#666; text-align:center; }
    .error { color:#b91c1c; margin-top:8px; font-size:13px; display:none; }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Create an account</h1>

    <form id="signup-form" autocomplete="on" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="you@example.com" />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required minlength="6" placeholder="At least 6 characters" />

      <div id="error" class="error" role="alert"></div>

      <button id="signup-btn" type="submit">Create account</button>
    </form>

    <div class="muted">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </main>

  <!-- Firebase v8 CDN scripts (load these first, only once) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <!-- Your shared app logic that initializes Firebase and exposes window.signup -->
  <script src="/js/app.js"></script>

  <!-- Page glue: uses window.signup or falls back to firebase.auth() -->
  <script>
    (function () {
      const form = document.getElementById('signup-form');
      const errorEl = document.getElementById('error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.style.display = 'none';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          errorEl.textContent = 'Please enter email and password.';
          errorEl.style.display = 'block';
          return;
        }

        try {
          if (typeof window.signup === 'function') {
            await window.signup(email, password);
            window.location.href = 'login.html';
            return;
          }

          if (window.firebase && firebase.auth) {
            await firebase.auth().createUserWithEmailAndPassword(email, password);
            window.location.href = 'login.html';
            return;
          }

          throw new Error('Firebase not initialized. Check /js/app.js and that CDN scripts loaded.');
        } catch (err) {
          errorEl.textContent = err.message || 'Signup failed. Check console for details.';
          errorEl.style.display = 'block';
          console.error('Signup error:', err);
        }
      });
    })();
  </script>
</body>
</html>
